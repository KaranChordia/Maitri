name: Deploy Maitri Circle to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "09_demos/maitri-circle/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Maitri Circle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 09_demos/maitri-circle
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Maitri Circle
        run: npm run build

  deploy:
    name: Deploy to Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Maitri Circle
        run: |
          cd 09_demos/maitri-circle
          npm ci
          npm run build

      - name: Upload Maitri Circle
        uses: actions/upload-pages-artifact@v3
        with:
          path: 09_demos/maitri-circle/dist

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
