name: Deploy Maitri website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "09_demos/website/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 09_demos/website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run website checks
        run: npm run check

  deploy:
    name: Deploy to Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: 09_demos/website

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
